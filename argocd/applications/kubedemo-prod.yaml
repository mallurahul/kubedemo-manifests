apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubedemo-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mallurahul/kubedemo-manifests.git
    targetRevision: main
    path: k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: kubedemo-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true